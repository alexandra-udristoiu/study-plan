name: CI

# Build, test, and lint on every push to main and every pull request.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # AGP 9 requires JDK 17 to run Gradle.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Configures Gradle and caches the build/dependency caches between runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew lintDebug

      # Always upload reports so failures are easy to inspect from the run page.
      - name: Upload test & lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-*.html
          if-no-files-found: ignore
